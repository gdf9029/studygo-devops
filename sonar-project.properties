# ============================================================
# SonarQube Analysis Properties — StudyGo
# sonar-project.properties
# ============================================================

# Project identification
sonar.projectKey=studygo-app
sonar.projectName=StudyGo E-Learning Platform
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src,server
sonar.tests=src/__tests__,server/tests

# Exclusions — don't scan generated/vendor code
sonar.exclusions=\
    **/node_modules/**, \
    **/build/**, \
    **/coverage/**, \
    **/*.test.js, \
    **/*.spec.js, \
    src/assets/**, \
    src/index.js, \
    public/**

# Test file patterns
sonar.test.inclusions=\
    src/__tests__/**/*.test.js, \
    src/__tests__/**/*.spec.js, \
    server/tests/**/*.test.js

# Coverage reports
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=\
    **/*.test.js, \
    **/*.spec.js, \
    src/index.js, \
    server/index.js

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# ── Quality Gate Thresholds ──
# These are enforced in SonarQube Quality Gate config (UI),
# but documented here for transparency:
#   - Coverage: >= 70%
#   - Duplicated Lines: < 5%
#   - Code Smells: < 10 new
#   - Bugs: 0 new
#   - Vulnerabilities: 0 new
#   - Security Hotspots: reviewed

# ── Trend Monitoring ──
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
