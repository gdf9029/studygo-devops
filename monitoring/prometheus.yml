# ============================================================
# Prometheus Configuration — StudyGo
# monitoring/prometheus.yml
# ============================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: "studygo"
    environment: "${ENVIRONMENT:-staging}"

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alert rules
rule_files:
  - "alert.rules.yml"

# ─── Scrape Configs ─────────────────────────────────────────
scrape_configs:

  # Self-monitor Prometheus
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Backend Node.js API — prom-client metrics at /metrics
  - job_name: "studygo-backend"
    static_configs:
      - targets: ["backend:4000"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Frontend Nginx — nginx-exporter
  - job_name: "studygo-frontend"
    static_configs:
      - targets: ["frontend:80"]
    metrics_path: /health

  # Host node metrics
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # MongoDB Exporter
  - job_name: "mongodb"
    static_configs:
      - targets: ["mongo:27017"]
    metrics_path: /metrics
