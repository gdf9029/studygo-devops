# ============================================================
# AlertManager Configuration — StudyGo
# monitoring/alertmanager.yml
# ============================================================

global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "adityasoodgood@gmail.com"
  smtp_auth_username: "adityasoodgood@gmail.com"
  smtp_auth_password: "mgfyzotdzqkpfclw"
  smtp_require_tls: true
  resolve_timeout: 5m

# ─── Routing Tree ────────────────────────────────────────────
route:
  group_by: ["alertname", "team"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-receiver"

  routes:
    - match:
        severity: critical
      receiver: "critical-receiver"
      repeat_interval: 1h

    - match:
        team: payments
      receiver: "payments-receiver"
      repeat_interval: 30m

    - match:
        team: devops
      receiver: "devops-receiver"
      repeat_interval: 2h

# ─── Receivers ───────────────────────────────────────────────
receivers:

  - name: "default-receiver"
    email_configs:
      - to: "team@studygo.internal"
        send_resolved: true

  - name: "critical-receiver"
    email_configs:
      - to: "oncall@studygo.internal"
        send_resolved: true

  - name: "payments-receiver"
    email_configs:
      - to: "payments@studygo.internal"
        send_resolved: true

  - name: "devops-receiver"
    email_configs:
      - to: "devops@studygo.internal"
        send_resolved: true

# ─── Inhibition Rules ────────────────────────────────────────
inhibit_rules:
  - source_match:
      alertname: "BackendDown"
    target_match_re:
      alertname: "HighResponseTime|HighErrorRate|CriticalErrorRate"
    equal: ["app"]
