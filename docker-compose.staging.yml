version: "3.9"

# ============================================================
# StudyGo — Staging Environment (Local Build)
# docker-compose.staging.yml
# ============================================================

networks:
  studygo-staging:
    driver: bridge

volumes:
  mongo-staging-data:
  prometheus-staging-data:
  grafana-staging-data:

services:

  # ─── MongoDB ────────────────────────────────────────────────
  mongo:
    image: mongo:6.0
    container_name: studygo-mongo-staging
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-staging_pass123}
      MONGO_INITDB_DATABASE: studygo_staging
    volumes:
      - mongo-staging-data:/data/db
    networks:
      - studygo-staging
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ─── Backend API (pre-built image) ─────────────────────────
  backend:
    image: studygo-pipeline-backend:latest
    container_name: studygo-backend-staging
    restart: unless-stopped
    environment:
      NODE_ENV: staging
      PORT: 4000
      MONGODB_URL: ${MONGODB_URL:-mongodb://admin:staging_pass123@mongo:27017/studygo_staging?authSource=admin}
      JWT_SECRET: ${JWT_SECRET:-demo_jwt_secret}
      MAIL_HOST: ${MAIL_HOST:-smtp.gmail.com}
      MAIL_USER: ${MAIL_USER:-demo@studygo.com}
      MAIL_PASS: ${MAIL_PASS:-demo_pass}
      FOLDER_NAME: StudyGo
      CLOUD_NAME: ${CLOUD_NAME:-demo_cloud}
      CLOUD_API_KEY: ${API_KEY:-123456789}
      CLOUD_API_SECRET: ${API_SECRET:-demo_secret}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY:-rzp_test_demo}
      RAZORPAY_SECRET: ${RAZORPAY_SECRET:-rzp_secret_demo}
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4001:4000"
    networks:
      - studygo-staging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      - "com.studygo.env=staging"
      - "com.studygo.service=backend"

  # ─── Frontend (pre-built image) ────────────────────────────
  frontend:
    image: studygo-pipeline-frontend:latest
    container_name: studygo-frontend-staging
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - studygo-staging
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.studygo.env=staging"
      - "com.studygo.service=frontend"

  # ─── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: studygo-prometheus-staging
    restart: unless-stopped
    volumes:
      - C:\studygo-monitoring\prometheus.yml:/etc/prometheus/prometheus.yml
      - C:\studygo-monitoring\alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus-staging-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9091:9090"
    networks:
      - studygo-staging

  # ─── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.1.0
    container_name: studygo-grafana-staging
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - grafana-staging-data:/var/lib/grafana
      - C:\studygo-monitoring\grafana\provisioning:/etc/grafana/provisioning
    ports:
      - "3002:3000"
    networks:
      - studygo-staging

  # ─── AlertManager ───────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: studygo-alertmanager-staging
    restart: unless-stopped
    volumes:
      - C:\studygo-monitoring\alertmanager.yml:/etc/alertmanager/alertmanager.yml
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
    ports:
      - "9094:9093"
    networks:
      - studygo-staging

  # ─── Node Exporter ──────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: studygo-node-exporter-staging
    restart: unless-stopped
    command:
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - studygo-staging
